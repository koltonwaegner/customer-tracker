<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="list"></div>

<script src="app.js"></script>
</body>
</html>
